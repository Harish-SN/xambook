# APP-OF-APPS. Apply this one file and ArgoCD installs everything else,
# ordered by the sync-wave annotation on each child Application:
#   wave 0  sealed-secrets
#   wave 1  rook-ceph operator, metrics-server
#   wave 2  rook-ceph cluster (CephCluster + StorageClass)
#   wave 3  kube-prometheus-stack
#   wave 4  xambook-platform (your app + routes + autoscaling + otel)
#
#   kubectl apply -f k8s/argocd/root-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: xambook-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Harish-SN/xambook.git
    targetRevision: main
    path: k8s/argocd/apps
    directory: {recurse: false}
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated: {prune: true, selfHeal: true}
