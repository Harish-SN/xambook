# Rook-Ceph OPERATOR (Helm) — installed via ArgoCD.
# Sync wave 1: the operator + CRDs must exist before the CephCluster (wave 2).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rook-ceph-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://charts.rook.io/release
    chart: rook-ceph
    # NOTE: verify the latest stable at https://github.com/rook/rook/releases
    targetRevision: v1.16.6
    helm:
      values: |
        # --- Trim the operator + CSI footprint for tiny (4GB) nodes ---
        csi:
          enableCephfsDriver: false        # we only need RBD (block), not shared FS
          enableGrpcMetrics: false
          provisionerReplicas: 1           # default is 2
          csiRBDProvisionerResource: |
            - name: csi-provisioner
              resource:
                requests: {memory: 128Mi, cpu: 50m}
                limits: {memory: 256Mi}
            - name: csi-resizer
              resource:
                requests: {memory: 64Mi, cpu: 25m}
                limits: {memory: 128Mi}
            - name: csi-attacher
              resource:
                requests: {memory: 64Mi, cpu: 25m}
                limits: {memory: 128Mi}
            - name: csi-rbdplugin
              resource:
                requests: {memory: 128Mi, cpu: 50m}
                limits: {memory: 256Mi}
            - name: csi-omap-generator
              resource:
                requests: {memory: 64Mi, cpu: 25m}
                limits: {memory: 128Mi}
            - name: liveness-prometheus
              resource:
                requests: {memory: 32Mi, cpu: 25m}
                limits: {memory: 64Mi}
        enableDiscoveryDaemon: false       # saves one DaemonSet across all nodes
        resources:
          requests: {memory: 128Mi, cpu: 100m}
          limits: {memory: 256Mi}
        # Let the operator schedule onto the control-plane (it runs workloads here)
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
  destination:
    server: https://kubernetes.default.svc
    namespace: rook-ceph
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
