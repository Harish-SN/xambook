# Prometheus + Grafana, trimmed hard for 4GB nodes (no Alertmanager, 6h retention).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.5.1
    helm:
      values: |
        alertmanager:
          enabled: false
        defaultRules:
          create: false
        kubeEtcd:        {enabled: false}
        kubeControllerManager: {enabled: false}
        kubeScheduler:   {enabled: false}
        prometheus-node-exporter:
          resources:
            requests: {cpu: 25m, memory: 32Mi}
            limits:   {memory: 64Mi}
        prometheusOperator:
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits:   {memory: 128Mi}
        prometheus:
          prometheusSpec:
            retention: 6h
            scrapeInterval: 60s
            # Discover ServiceMonitors in ALL namespaces (e.g. our backend).
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            resources:
              requests: {cpu: 100m, memory: 384Mi}
              limits:   {memory: 640Mi}
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: ceph-block
                  accessModes: ["ReadWriteOnce"]
                  resources: {requests: {storage: 5Gi}}
        grafana:
          adminPassword: changeMe-grafana-2025      # CHANGE THIS / seal it
          resources:
            requests: {cpu: 50m, memory: 96Mi}
            limits:   {memory: 192Mi}
          persistence:
            enabled: true
            storageClassName: ceph-block
            size: 1Gi
          # We route via the Gateway API instead of the chart's Ingress.
          ingress: {enabled: false}
          grafana.ini:
            server:
              root_url: https://grafana.xambook.com
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
