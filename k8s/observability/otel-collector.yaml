apiVersion: v1
kind: Namespace
metadata:
  name: observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc: {endpoint: 0.0.0.0:4317}
          http: {endpoint: 0.0.0.0:4318}
    processors:
      memory_limiter:
        check_interval: 5s
        limit_mib: 150
        spike_limit_mib: 40
      batch:
        timeout: 5s
        send_batch_size: 512
    exporters:
      # Logs spans to collector stdout. Swap for an otlp exporter to Tempo/Jaeger later.
      debug:
        verbosity: normal
      prometheus:
        endpoint: 0.0.0.0:8889
    service:
      telemetry:
        metrics: {level: basic}
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [prometheus]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels: {app: otel-collector}
  template:
    metadata:
      labels: {app: otel-collector}
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.119.0
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - {name: otlp-grpc, containerPort: 4317}
            - {name: otlp-http, containerPort: 4318}
            - {name: prom, containerPort: 8889}
          volumeMounts:
            - {name: config, mountPath: /etc/otel}
          resources:
            requests: {cpu: 50m, memory: 96Mi}
            limits:   {memory: 192Mi}
      volumes:
        - name: config
          configMap: {name: otel-collector-config}
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observability
  labels: {app: otel-collector}
spec:
  selector: {app: otel-collector}
  ports:
    - {name: otlp-grpc, port: 4317, targetPort: 4317}
    - {name: otlp-http, port: 4318, targetPort: 4318}
    - {name: prom, port: 8889, targetPort: 8889}
