apiVersion: apps/v1
kind: Deployment
metadata:
  name: xambook-backend
  namespace: default

spec:
  replicas: 2

  selector:
    matchLabels:
      app: xambook-backend

  template:
    metadata:
      labels:
        app: xambook-backend

    spec:
      containers:
        - name: backend

          image: harishsudalaimani/xambook-backend:v1

          imagePullPolicy: Always

          ports:
            - containerPort: 8080