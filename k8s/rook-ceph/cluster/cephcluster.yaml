apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  cephVersion:
    # Verify a current tag at https://quay.io/repository/ceph/ceph?tab=tags
    image: quay.io/ceph/ceph:v18.2.4
  dataDirHostPath: /var/lib/rook

  # 3 mons across the 3 nodes (control-plane + 2 workers) => proper quorum.
  mon:
    count: 3
    allowMultiplePerNode: false
  mgr:
    count: 1
    modules:
      - name: pg_autoscaler
        enabled: true

  dashboard:
    enabled: true
    ssl: false      # exposed internally only; TLS is terminated at the Gateway

  # --- Memory discipline for 4GB nodes ---
  resources:
    mon:
      requests: {cpu: "100m", memory: "256Mi"}
      limits:   {memory: "512Mi"}
    mgr:
      requests: {cpu: "100m", memory: "256Mi"}
      limits:   {memory: "512Mi"}
    osd:
      # OSD memory target is pinned below (osdMemoryTargetBytes). The limit must
      # sit ABOVE that target + overhead, or the OSD gets OOMKilled. 1280Mi works.
      requests: {cpu: "250m", memory: "512Mi"}
      limits:   {memory: "1280Mi"}
    prepareosd:
      requests: {cpu: "100m", memory: "128Mi"}
      limits:   {memory: "256Mi"}
    crashcollector:
      requests: {cpu: "50m", memory: "32Mi"}
      limits:   {memory: "64Mi"}
    mgr-sidecar:
      requests: {cpu: "50m", memory: "32Mi"}
      limits:   {memory: "64Mi"}

  # All three nodes (incl. control-plane) contribute the one raw disk Terraform attached.
  storage:
    useAllNodes: true
    useAllDevices: false
    devices:
      - name: "/dev/disk/by-id/google-ceph-data"
    # Pin osd_memory_target to 896Mi (Ceph's hard minimum). Without this, Rook
    # derives a value below the floor and the OSD aborts on startup with
    # "FAILED ceph_assert(r >= 0)" in config.cc. This is the fix for the crash.
    config:
      osdMemoryTargetBytes: "939524096"   # 896 MiB

  # Allow Ceph daemons onto the control-plane (it runs workloads in this topology).
  placement:
    all:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

  # With only 3 hosts, never let Rook tear the cluster below quorum during upgrades.
  disruptionManagement:
    managePodBudgets: true