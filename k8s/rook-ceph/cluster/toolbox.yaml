# Optional debugging pod: `kubectl -n rook-ceph exec -it deploy/rook-ceph-tools -- ceph status`
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rook-ceph-tools
  namespace: rook-ceph
  labels:
    app: rook-ceph-tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rook-ceph-tools
  template:
    metadata:
      labels:
        app: rook-ceph-tools
    spec:
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: rook-ceph-tools
          image: quay.io/ceph/ceph:v18.2.4
          command: ["/bin/bash", "-c", "sleep infinity"]
          imagePullPolicy: IfNotPresent
          env:
            - name: ROOK_CEPH_USERNAME
              valueFrom:
                secretKeyRef: {name: rook-ceph-mon, key: ceph-username}
          volumeMounts:
            - {name: ceph-config, mountPath: /etc/ceph}
            - {name: mon-endpoint-volume, mountPath: /etc/rook}
          resources:
            requests: {cpu: "50m", memory: "64Mi"}
            limits:   {memory: "128Mi"}
      volumes:
        - name: mon-endpoint-volume
          configMap:
            name: rook-ceph-mon-endpoints
            items: [{key: data, path: mon-endpoints}]
        - name: ceph-config
          emptyDir: {}
      tolerations:
        - {key: node-role.kubernetes.io/control-plane, operator: Exists, effect: NoSchedule}
