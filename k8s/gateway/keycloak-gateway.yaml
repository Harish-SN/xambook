apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-gateway-keycloak
  namespace: keycloak
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: keycloak
  to:
    - group: ""
      kind: Service
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak-route
  namespace: keycloak
spec:
  parentRefs:
    - name: xambook-gateway
      namespace: xambook
      sectionName: https
  hostnames:
    - "keycloak.xambook.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: keycloak
          port: 8080