apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: xambook-gateway
  namespace: xambook
spec:
  gatewayClassName: cilium

  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: xambook-routes
  namespace: xambook

spec:
  parentRefs:
    - name: xambook-gateway

  hostnames:
    - "xambook.com"
    - "gcp.xambook.com"

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api

      backendRefs:
        - name: backend
          port: 8080

    - matches:
        - path:
            type: PathPrefix
            value: /

      backendRefs:
        - name: frontend
          port: 80