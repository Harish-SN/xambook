apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shared-gateway
  namespace: default
spec:
  gatewayClassName: cilium

  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.xambook.com"

      allowedRoutes:
        namespaces:
          from: All

  addresses:
    - type: IPAddress
      value: 34.47.128.66