apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: xambook
spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      nodeSelector:
        workload: app

      containers:
        - name: frontend
          image: harishsudalaimani/xambook-frontend:v1
          imagePullPolicy: Always

          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: xambook
spec:
  selector:
    app: frontend

  ports:
    - port: 80
      targetPort: 80

  type: ClusterIP