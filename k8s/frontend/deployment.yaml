apiVersion: apps/v1
kind: Deployment
metadata:
  name: xambook-frontend
  namespace: default

spec:
  replicas: 2

  selector:
    matchLabels:
      app: xambook-frontend

  template:
    metadata:
      labels:
        app: xambook-frontend

    spec:
      containers:
        - name: frontend

          image: harishsudalaimani/xambook-frontend:70df2d37d4af67fa0373139b8e25ee2321ebc269

          imagePullPolicy: Always

          ports:
            - containerPort: 80

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"