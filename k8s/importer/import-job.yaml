apiVersion: batch/v1
kind: Job
metadata:
  name: question-import
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: importer
          image: harishsudalaimani/xambook-importer:1a0286ecb153e6755ef192b8b945bb62d42ef59d
          env:
            - name: POSTGRES_URL
              value: postgres://postgres:postgres123@postgres:5432/xambook?sslmode=disable
      restartPolicy: Never
  backoffLimit: 1