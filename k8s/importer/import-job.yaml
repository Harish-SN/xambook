apiVersion: batch/v1
kind: Job
metadata:
  name: question-import
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: importer
          image: harishsudalaimani/xambook-importer:59fbe152875e79cb7afbb01c1b36a6bd97766d17
          env:
            - name: POSTGRES_URL
              value: postgres://postgres:postgres123@postgres:5432/xambook?sslmode=disable
      restartPolicy: Never
  backoffLimit: 1