apiVersion: batch/v1
kind: Job

metadata:
  name: question-import
  namespace: default

spec:
  template:
    spec:
      containers:
        - name: importer
          image: harishsudalaimani/xambook-importer:9d59b8542120f47086a568f084cbd36169db21ad

          env:
            - name: POSTGRES_URL
              value: postgres://postgres:postgres123@postgres:5432/xambook?sslmode=disable

      restartPolicy: Never

  backoffLimit: 1