apiVersion: batch/v1
kind: Job
metadata:
  name: question-import
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: importer
          image: harishsudalaimani/xambook-importer:34ca9264afbf13a0a6a41bd05a3473fae8716a1b
          env:
            - name: POSTGRES_URL
              value: postgres://postgres:postgres123@postgres:5432/xambook?sslmode=disable
      restartPolicy: Never
  backoffLimit: 1