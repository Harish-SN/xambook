apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
  namespace: xambook
type: Opaque
stringData:
  KC_BOOTSTRAP_ADMIN_USERNAME: admin
  KC_BOOTSTRAP_ADMIN_PASSWORD: changeMe-admin-2025   # CHANGE THIS / seal it
  KC_DB_PASSWORD: xambook2025secure
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: xambook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      # --- Spread keycloak away from the other heavy pods (postgres, prometheus) ---
      # "preferred" (not required) so it still schedules even on a full cluster.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["postgres"]
                topologyKey: kubernetes.io/hostname
            - weight: 80
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values: ["prometheus"]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.1
          # start (not start-dev); realm import on first boot.
          args: ["start", "--import-realm", "--optimized"]
          env:
            # --- DB (reuses the in-cluster Postgres, 'keycloak' database) ---
            - {name: KC_DB, value: postgres}
            - {name: KC_DB_URL, value: "jdbc:postgresql://postgres.xambook.svc.cluster.local:5432/keycloak"}
            - {name: KC_DB_USERNAME, value: postgres}
            - name: KC_DB_PASSWORD
              valueFrom: {secretKeyRef: {name: keycloak-secret, key: KC_DB_PASSWORD}}
            # --- Bootstrap admin (KC 26 naming) ---
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom: {secretKeyRef: {name: keycloak-secret, key: KC_BOOTSTRAP_ADMIN_USERNAME}}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom: {secretKeyRef: {name: keycloak-secret, key: KC_BOOTSTRAP_ADMIN_PASSWORD}}
            # --- Behind the Gateway: TLS terminates upstream, KC speaks HTTP ---
            - {name: KC_HOSTNAME, value: "https://auth.xambook.com"}
            - {name: KC_HTTP_ENABLED, value: "true"}
            - {name: KC_PROXY_HEADERS, value: "xforwarded"}
            - {name: KC_HEALTH_ENABLED, value: "true"}
            - {name: KC_METRICS_ENABLED, value: "true"}
            # --- Build options must be present at runtime for --optimized to work ---
            - {name: KC_DB, value: postgres}
            # --- Keep the JVM small enough for a 4GB node ---
            - {name: JAVA_OPTS_KC_HEAP, value: "-Xms256m -Xmx512m"}
          ports:
            - {name: http, containerPort: 8080}
            - {name: management, containerPort: 9000}
          volumeMounts:
            - {name: realm, mountPath: /opt/keycloak/data/import}
          resources:
            requests: {cpu: "250m", memory: "512Mi"}
            limits:   {memory: "896Mi"}
          readinessProbe:
            httpGet: {path: /health/ready, port: 9000}
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 20
          startupProbe:
            httpGet: {path: /health/started, port: 9000}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60        # ~10 min runway for slow first-boot build
      volumes:
        - name: realm
          configMap: {name: keycloak-realm}
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: xambook
spec:
  selector:
    app: keycloak
  ports:
    - {name: http, port: 8080, targetPort: 8080}
    - {name: management, port: 9000, targetPort: 9000}
  type: ClusterIP