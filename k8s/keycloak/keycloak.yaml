apiVersion: apps/v1
kind: Deployment

metadata:
  name: keycloak
  namespace: default

spec:
  replicas: 1

  selector:
    matchLabels:
      app: keycloak

  template:
    metadata:
      labels:
        app: keycloak

    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.2

          args:
            - start

          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: admin

            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: admin123

            - name: KC_PROXY
              value: edge

            - name: KC_PROXY_HEADERS
              value: xforwarded

            - name: KC_HTTP_ENABLED
              value: "true"

            - name: KC_HOSTNAME
              value: https://auth.xambook.com

            - name: KC_HOSTNAME_STRICT
              value: "false"

            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "true"

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20

---
apiVersion: v1
kind: Service

metadata:
  name: keycloak
  namespace: default

spec:
  type: ClusterIP

  selector:
    app: keycloak

  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080