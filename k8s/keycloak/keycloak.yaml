apiVersion: apps/v1
kind: Deployment

metadata:
  name: keycloak

spec:
  replicas: 1

  selector:
    matchLabels:
      app: keycloak

  template:
    metadata:
      labels:
        app: keycloak

    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.2

          args:
            - start-dev

          env:
          - name: KC_BOOTSTRAP_ADMIN_USERNAME
            value: admin

          - name: KC_BOOTSTRAP_ADMIN_PASSWORD
            value: admin123

          - name: KC_PROXY_HEADERS
            value: xforwarded

          - name: KC_HTTP_ENABLED
            value: "true"

          - name: KC_HOSTNAME
            value: auth.xambook.com

          - name: KC_HOSTNAME_STRICT
            value: "false"

          ports:
            - containerPort: 8080
              name: http

---
apiVersion: v1
kind: Service

metadata:
  name: keycloak

spec:
  selector:
    app: keycloak

  ports:
    - port: 80
      name: http
      protocol: TCP
      targetPort: 8080