apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: xambook
data:
  xambook-realm.json: |
    {
      "realm": "xambook",
      "enabled": true,
      "sslRequired": "external",
      "registrationAllowed": true,
      "loginWithEmailAllowed": true,
      "clients": [
        {
          "clientId": "xambook-frontend",
          "name": "Xambook Frontend (SPA)",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "attributes": { "pkce.code.challenge.method": "S256" },
          "redirectUris": [
            "https://xambook.com/*",
            "https://www.xambook.com/*",
            "https://gcp.xambook.com/*",
            "http://localhost:5173/*"
          ],
          "webOrigins": [
            "https://xambook.com",
            "https://www.xambook.com",
            "https://gcp.xambook.com",
            "http://localhost:5173"
          ],
          "protocolMappers": [
            {
              "name": "backend-audience",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-mapper",
              "config": {
                "included.client.audience": "xambook-backend",
                "access.token.claim": "true",
                "id.token.claim": "false"
              }
            }
          ]
        }
      ]
    }
