apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: xambook
type: Opaque
stringData:
  POSTGRES_DB: xambook
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: xambook2025secure
  KEYCLOAK_DB: keycloak
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-initdb
  namespace: xambook
data:
  01-create-keycloak-db.sql: |
    SELECT 'CREATE DATABASE keycloak'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'keycloak')\gexec
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: xambook
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests: {cpu: "100m", memory: "256Mi"}
            limits:   {memory: "512Mi"}
          readinessProbe:
            exec: {command: ["pg_isready", "-U", "postgres"]}
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: initdb
          configMap:
            name: postgres-initdb
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ceph-block
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: xambook
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None