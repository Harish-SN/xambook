apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: xambook
type: Opaque
stringData:
  POSTGRES_DB: xambook
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: xambook2025secure

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: xambook
spec:
  serviceName: postgres
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      nodeSelector:
        role: data

      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: Always

          ports:
            - containerPort: 5432

          envFrom:
            - secretRef:
                name: postgres-secret

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data

  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce

        resources:
          requests:
            storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: xambook
spec:
  selector:
    app: postgres

  ports:
    - port: 5432
      targetPort: 5432

  clusterIP: None