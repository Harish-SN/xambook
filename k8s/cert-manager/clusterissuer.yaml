apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod

spec:
  acme:
    email: xambooktech@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory

    privateKeySecretRef:
      name: letsencrypt-prod-key

    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: xambook-gateway
                namespace: xambook