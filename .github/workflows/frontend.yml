name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/xambook-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/xambook-frontend:${{ github.sha }}

      - name: Bump image tag in manifest (GitOps -> ArgoCD deploys)
        run: |
          IMG="${{ secrets.DOCKER_USERNAME }}/xambook-frontend"
          sed -i -E "s|image: .*/xambook-frontend:.*|image: ${IMG}:${{ github.sha }}|" k8s/frontend/frontend.yaml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git commit -am "ci(frontend): deploy ${{ github.sha }} [skip ci]"
            git push
          fi