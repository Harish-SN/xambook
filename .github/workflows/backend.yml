name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'k8s/backend/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Tidy, vet, test, build
        working-directory: backend
        run: |
          go mod tidy
          go vet ./...
          go test ./... || echo "no tests yet"

          go build ./cmd/api
          go build ./cmd/importer

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Backend Image
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/xambook-backend:${{ github.sha }}

      # Importer Image
      - name: Build and push importer image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.importer
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/xambook-importer:${{ github.sha }}

      # Update backend deployment
      - name: Bump backend image tag
        run: |
          IMG="${{ secrets.DOCKER_USERNAME }}/xambook-backend"

          sed -i -E "s|image: .*/xambook-backend:.*|image: ${IMG}:${{ github.sha }}|" k8s/backend/deployment.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          git commit -m "ci: deploy ${{ github.sha }} [skip ci]" || echo "No changes to commit"

          git pull --rebase origin main

          git push origin main