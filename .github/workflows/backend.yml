name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'k8s/backend/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Tidy, vet, test, build
        working-directory: backend
        run: |
          go mod tidy
          go vet ./...
          go test ./... || echo "no tests yet"
          go build ./...

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/xambook-backend:${{ github.sha }}

      - name: Bump image tag in manifest
        run: |
          IMG="${{ secrets.DOCKER_USERNAME }}/xambook-backend"

          sed -i -E "s|image: .*/xambook-backend:.*|image: ${IMG}:${{ github.sha }}|" k8s/backend/backend.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet; then
            git commit -am "ci(backend): deploy ${{ github.sha }} [skip ci]"
            git push
          fi